<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Ariel Armoni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#" id="prev-project" class="nav-arrow bottom">previous</a>
    <a href="#" id="next-project" class="nav-arrow bottom">next</a>

    <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>
                    <a href="contact.html" class="nav-label">Contact</a>
                </div>
            </div>
            <a href="index.html" class="logo">ARIEL ARMONI</a>
            <div class="sub-logo">Exhibition Architecture</div>
        </header>

        <main>
            <div class="project-content-container">
                <h1 id="project-title"></h1>
                <div id="project-meta" class="project-meta"></div>
                <div id="project-desc" class="project-description"></div>
                <div id="gallery" class="gallery"></div>
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        async function initProject() {
            const folder = new URLSearchParams(window.location.search).get('folder');
            if (!folder) return;

            try {
                const { folders } = await window.portfolioData;
                const idx = folders.indexOf(folder);
                if (idx !== -1) {
                    document.getElementById('prev-project').href = `project.html?folder=${folders[idx <= 0 ? folders.length - 1 : idx - 1]}`;
                    document.getElementById('next-project').href = `project.html?folder=${folders[idx >= folders.length - 1 ? 0 : idx + 1]}`;
                }

                const res = await fetch(`images/${folder}/info.txt?v=${Date.now()}`);
                const fullText = await res.text();
                const parts = fullText.split("FILES:");
                const lines = parts[0].split(/\r?\n/).filter(l => l.trim() !== "");
                
                document.getElementById('project-title').textContent = lines[0];
                
                // טעינת תמונות וקרדיטים
                const creditsMap = {};
                if (parts[1]) {
                    parts[1].split(/\r?\n/).forEach(line => {
                        if (line.includes(' - ')) {
                            const num = line.substring(0, 2);
                            creditsMap[num] = line.split(' - ')[1].trim();
                        }
                    });
                }

                const gallery = document.getElementById('gallery');
                const track = document.createElement('div'); track.className = 'carousel-track';
                gallery.appendChild(track);

                for (let i = 1; i <= 50; i++) {
                    const num = i.toString().padStart(2, '0');
                    const img = new Image();
                    img.src = `images/${folder}/${num}.jpg`;
                    await new Promise(r => img.onload = r).catch(() => img.remove());
                    if (img.parentElement) {
                        const slide = document.createElement('div'); slide.className = 'carousel-slide';
                        if (creditsMap[num]) {
                            const fig = document.createElement('figure');
                            fig.innerHTML = `<img src="${img.src}"><figcaption>${creditsMap[num]}</figcaption>`;
                            slide.appendChild(fig);
                        } else slide.appendChild(img);
                        track.appendChild(slide);
                    }
                }
            } catch (e) { console.error(e); }
        }
        initProject();
    </script>
</body>
</html>
