<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Ariel Armoni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>
                    <a href="contact.html" class="nav-label">Contact</a>
                </div>
            </div>
            <a href="index.html" class="logo">ARIEL ARMONI</a>
            <div class="sub-logo">Exhibition Architecture</div>
        </header>

        <main>
            <div class="project-content-container">
                <h1 id="project-title"></h1>
                <div id="project-meta" class="project-meta"></div>
                <div id="project-desc" class="project-description"></div>
                <div id="gallery" class="gallery"></div>
                
                <div class="project-nav-bottom">
                    <a href="#" id="prev-project">previous</a>
                    <a href="#" id="next-project">next</a>
                </div>
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        async function initProject() {
            const folder = new URLSearchParams(window.location.search).get('folder');
            if (!folder) return;
            const base = typeof baseURL !== 'undefined' ? baseURL : '';
            const res = await fetch(`${base}/images/${folder}/info.txt?v=${Date.now()}`);
            const fullText = await res.text();
            
            const parts = fullText.split("FILES:");
            const lines = parts[0].split(/\r?\n/).filter(l => l.trim() !== "");
            
            document.getElementById('project-title').textContent = lines[0];
            // טעינת תמונות בסיסית (בלי סליידרים מסובכים כרגע)
            const gallery = document.getElementById('gallery');
            for (let i = 1; i <= 50; i++) {
                const num = i.toString().padStart(2, '0');
                const img = document.createElement('img');
                img.src = `${base}/images/${folder}/${num}.jpg`;
                img.onerror = () => img.remove();
                gallery.appendChild(img);
            }
        }
        initProject();
    </script>
</body>
</html>
