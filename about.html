<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Ariel Armoni</title>
    <meta name="description" content="Ariel Armoni - architect and exhibition designer specializing in art installations, children's exhibitions, and interactive exhibits.">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ariel Armoni | Exhibition Architecture">
    <meta property="og:title" content="About | Ariel Armoni">
    <meta property="og:description" content="Ariel Armoni - architect and exhibition designer specializing in art installations and interactive exhibits.">
    <meta property="og:url" content="https://arielarmoni.com/about.html">
    <meta name="twitter:card" content="summary">

    <link rel="canonical" href="https://arielarmoni.com/about.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
    
    <link rel="stylesheet" href="style.css">

    <style>
        .about-container-fixed {
            width: 80vw !important;
            max-width: 1100px !important;
            margin: 0 auto !important;
            padding: 60px 0 100px 0 !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: start !important;
            direction: ltr !important;
            box-sizing: border-box !important;
        }

        .about-text-column {
            width: 55% !important;
            text-align: left !important;
            box-sizing: border-box !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        /* נעילת צבע וראות לפסקאות האודות */
        .about-text-column p {
            font-size: 15px !important;
            line-height: 1.7 !important;
            margin-bottom: 25px !important;
            color: #333333 !important; /* אפור כהה עמוק וקבוע */
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .about-image-column {
            width: 38% !important;
            box-sizing: border-box !important;
        }

        .about-image-column img {
            width: 100% !important;
            height: auto !important;
            display: block !important;
            object-fit: cover !important;
        }

        /* נעילת צבע וראות לאזור הלקוחות הנבחרים */
        .clients-section { 
            margin-top: 40px !important; 
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .clients-section h3 { 
            font-size: 11px !important; 
            text-transform: uppercase !important; 
            letter-spacing: 2px !important; 
            color: #888888 !important; /* צבע טקסט קבוע לכותרת */
            margin-bottom: 25px !important; 
            font-weight: 500 !important;
            text-align: left !important;
        }

        .clients-list { 
            list-style: none !important; 
            padding: 0 !important; 
            margin: 0 !important;
            display: flex !important; 
            flex-direction: column !important; 
            gap: 14px !important; 
        }

        .clients-list li { 
            font-size: 13px !important; 
            color: #444444 !important; /* צבע טקסט קבוע לרשימת המוזיאונים */
            text-align: left !important;
            border-bottom: none !important;
            padding-bottom: 0 !important;
            max-width: 100% !important;
            display: list-item !important;
        }

        /* התאמה מלאה למובייל וטאבלטים */
        @media (max-width: 900px) {
            .about-container-fixed {
                flex-direction: column !important;
                width: 90vw !important;
                padding-top: 40px !important;
            }
            .about-text-column {
                width: 100% !important;
                order: 2 !important;
            }
            .about-image-column {
                width: 100% !important;
                margin-bottom: 35px !important;
                order: 1 !important;
            }
        }
    </style>
</head>
<body>
   <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>
                    <a href="contact.html" class="nav-label">Contact</a>
                </div>
            </div>
            <a href="index.html" class="logo">ARIEL ARMONI</a>
            <div class="sub-logo">Exhibition Architecture</div>
        </header>

        <main class="about-container-fixed">
            <div class="about-text-column" id="about-text-container">
                </div>
            <div class="about-image-column">
                <img src="images/profile.jpg" alt="Ariel Armoni">
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        // יצירת חותמת זמן ייחודית לרענון קשיח של קובץ הטקסט
        var cacheBuster = new Date().getTime();

        async function loadAboutContent() {
            const container = document.getElementById('about-text-container');
            if (!container) return;
            
            try {
                const res = await fetch('about_content.txt?v=' + cacheBuster);
                if (!res.ok) throw new Error("Could not load about_content.txt");
                
                const fullText = await res.text();
                
                const parts = fullText.split("CLIENTS:");
                const paragraphs = parts[0].trim().split(/\r?\n\r?\n/);
                const clients = parts[1] ? parts[1].trim().split(/\r?\n/) : [];

                let htmlContent = "";

                paragraphs.forEach(p => {
                    if (p.trim()) htmlContent += `<p>${p.trim()}</p>`;
                });

                if (clients.length > 0) {
                    htmlContent += `
                        <div class="clients-section">
                            <h3>Selected Clients</h3>
                            <ul class="clients-list">
                                ${clients.map(c => `<li>${c.trim()}</li>`).join('')}
                            </ul>
                        </div>`;
                }

                container.innerHTML = htmlContent;
            } catch (e) {
                console.error(e);
                container.innerHTML = "<p style='color:#333 !important;'>Error loading content. Please ensure about_content.txt exists.</p>";
            }
        }

        // טעינה מאובטחת ללא קשר למצב הדף
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAboutContent);
        } else {
            loadAboutContent();
        }
    </script>
</body>
</html>
