<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Ariel Armoni</title>
    <meta name="description" content="Ariel Armoni - architect and exhibition designer specializing in art installations, children's exhibitions, and interactive exhibits.">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ariel Armoni | Exhibition Architecture">
    <meta property="og:title" content="About | Ariel Armoni">
    <meta property="og:description" content="Ariel Armoni - architect and exhibition designer specializing in art installations and interactive exhibits.">
    <meta property="og:url" content="https://arielarmoni.com/about.html">
    <meta name="twitter:card" content="summary">

    <link rel="canonical" href="https://arielarmoni.com/about.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* חוק קטן שמבטיח שבמובייל התמונה תעלה לראש העמוד לפני הטקסט */
        @media (max-width: 1024px) {
            .about-image-container { order: -1; }
        }
    </style>
</head>
<body>
   <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>
                    <a href="contact.html" class="nav-label">Contact</a>
                </div>
            </div>
            <a href="index.html" class="logo">ARIEL ARMONI</a>
            <div class="sub-logo">Exhibition Architecture</div>
        </header>

        <main class="about-content">
            <div class="about-text" id="about-text-container">
                </div>
            <div class="about-image-container">
                <img src="images/profile.jpg" alt="Ariel Armoni">
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        // תיקון קריטי: הגדרת המשתנה שמונע מהדפדפן לתקוע את טעינת הטקסט
        const cacheBuster = new Date().getTime();

        async function loadAboutContent() {
            const container = document.getElementById('about-text-container');
            try {
                const res = await fetch(`about_content.txt?v=${cacheBuster}`);
                if (!res.ok) throw new Error("Could not load about_content.txt");
                
                const fullText = await res.text();
                
                const parts = fullText.split("CLIENTS:");
                const paragraphs = parts[0].trim().split(/\r?\n\r?\n/);
                const clients = parts[1] ? parts[1].trim().split(/\r?\n/) : [];

                let htmlContent = "";

                paragraphs.forEach(p => {
                    if (p.trim()) htmlContent += `<p>${p.trim()}</p>`;
                });

                if (clients.length > 0) {
                    htmlContent += `
                        <div class="clients-section">
                            <h3>Selected Clients</h3>
                            <ul class="clients-list">
                                ${clients.map(c => `<li>${c.trim()}</li>`).join('')}
                            </ul>
                        </div>`;
                }

                container.innerHTML = htmlContent;
            } catch (e) {
                console.error(e);
                container.innerHTML = "<p>Error loading content. Please ensure about_content.txt exists.</p>";
            }
        }

        window.addEventListener('DOMContentLoaded', loadAboutContent);
    </script>
</body>
</html>
